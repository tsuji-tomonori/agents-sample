services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$${OLLAMA_MODEL}\""]

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
    ports:
      - "8787:8787"

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: http://localhost:8787
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8787
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  ollama-data:
